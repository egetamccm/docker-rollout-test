services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "${PROXY_PORT:-8070}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-rollout-demo:web
    expose:
      - "3000"
    environment:
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-v1}
    healthcheck:
      test: ["CMD", "npm", "run", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      docker-rollout.pre-stop-hook: "touch /tmp/drain && sleep 8"
